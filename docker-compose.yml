
services:

  postgres:
    image: postgres:15
    container_name: url_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - url_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: url_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - url_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: url_auth
    env_file: .env
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - url_network
    volumes:
      - ./services/auth:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload

  url:
    build:
      context: ./services/url
      dockerfile: Dockerfile
    container_name: url_service
    env_file: .env
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - url_network
    volumes:
      - ./services/url:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8002 --reload

  analytics:
    build:
      context: ./services/analytics
      dockerfile: Dockerfile
    container_name: url_analytics
    env_file: .env
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - url_network
    volumes:
      - ./services/analytics:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8003 --reload

  celery_worker:
    build:
      context: ./services/analytics
      dockerfile: Dockerfile
    container_name: url_celery
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - url_network
    volumes:
      - ./services/analytics:/app
    command: celery -A tasks worker --loglevel=info

networks:
  url_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: